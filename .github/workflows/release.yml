name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [ win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64 ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Single-file / self-contained / compressed settings live in the .csproj, so a plain
      # RID-targeted publish already yields one binary.
      - name: Publish
        run: dotnet publish FNFBot.App/FNFBot.App.csproj -c Release -r ${{ matrix.rid }} -o publish/${{ matrix.rid }}

      - name: Package
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../FNFBot-${{ matrix.rid }}.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FNFBot-${{ matrix.rid }}
          path: FNFBot-${{ matrix.rid }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FNFBot-${{ matrix.rid }}.zip
